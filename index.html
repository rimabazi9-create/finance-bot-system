<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Broker Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; padding: 20px; }
        .box { width: 400px; background: #2d2d2d; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #3d3d3d; color: white; }
        button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; background: #007bff; color: white; cursor: pointer; }
        #dashboard { display: none; }
        .success { color: #28a745; margin-top: 10px; word-break: break-all; }
        .error { color: #dc3545; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box" id="loginArea">
    <h2>تسجيل دخول البروكر</h2>
    <input type="text" id="user" placeholder="اسم المستخدم">
    <input type="password" id="pass" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
</div>

<div class="box" id="dashboard">
    <h2>لوحة تحكم الوسيط</h2>
    <input type="number" id="totalAmount" placeholder="المبلغ (TRX)">
    <input type="text" id="receiverAddress" placeholder="عنوان المحفظة (Receiver)">
    <input type="text" id="approvalCode" placeholder="كود الموافقة">
    <button onclick="process()">تنفيذ المعاملة</button>
    <div id="result"></div>
</div>

<script>
    async function login() {
        const res = await fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ username: document.getElementById('user').value, password: document.getElementById('pass').value }) });
        const data = await res.json();
        if (data.status === "Success") { document.getElementById('loginArea').style.display = 'none'; document.getElementById('dashboard').style.display = 'block'; } 
        else { alert(data.message); }
    }

    async function process() {
        const res = await fetch('/process-transaction', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ totalAmount: document.getElementById('totalAmount').value, receiverAddress: document.getElementById('receiverAddress').value, approvalCode: document.getElementById('approvalCode').value }) });
        const data = await res.json();
        const resDiv = document.getElementById('result');
        resDiv.className = data.status === "Success" ? "success" : "error";
        resDiv.innerText = data.status === "Success" ? "تمت بنجاح! رقم العملية: " + data.txid : "خطأ: " + data.message;
    }
</script>
</body>
</html>
