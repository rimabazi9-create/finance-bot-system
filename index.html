<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Broker System</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; display: flex; justify-content: center; }
        .box { width: 350px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 10px; margin: 10px 0; }
        #dashboard { display: none; }
    </style>
</head>
<body>

<div class="box" id="loginArea">
    <h2>تسجيل الدخول</h2>
    <input type="text" id="user" placeholder="اسم المستخدم">
    <input type="password" id="pass" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
</div>

<div class="box" id="dashboard">
    <h2>لوحة التحكم</h2>
    <input type="number" id="totalAmount" placeholder="المبلغ">
    <input type="text" id="receiverAddress" placeholder="عنوان المحفظة">
    <input type="text" id="approvalCode" placeholder="كود الموافقة">
    <button onclick="process()">تنفيذ المعاملة</button>
    <div id="result"></div>
</div>

<script>
    async function login() {
        const res = await fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ username: document.getElementById('user').value, password: document.getElementById('pass').value }) });
        const data = await res.json();
        if (data.status === "Success") { document.getElementById('loginArea').style.display = 'none'; document.getElementById('dashboard').style.display = 'block'; }
        else { alert(data.message); }
    }

    async function process() {
        const res = await fetch('/process-transaction', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ totalAmount: document.getElementById('totalAmount').value, receiverAddress: document.getElementById('receiverAddress').value, approvalCode: document.getElementById('approvalCode').value }) });
        const data = await res.json();
        document.getElementById('result').innerText = data.status === "Success" ? "نجاح: " + data.txid : "خطأ: " + data.message;
    }
</script>
</body>
</html>
